<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="icon" href="data:,">
    <style>
      :root {
        --ink: #17211b;
        --muted: #5f6b63;
        --line: #d9ded8;
        --panel: #ffffff;
        --page: #f4f6f1;
        --green: #1d7a55;
        --amber: #a56318;
        --red: #a23a32;
        --steel: #31536b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      a {
        color: inherit;
      }

      html {
        scroll-behavior: smooth;
      }

      [id] {
        scroll-margin-top: 84px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 28px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
        position: sticky;
        top: 0;
        z-index: 2;
      }

      .brand {
        font-weight: 750;
        font-size: 18px;
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .nav a,
      .button {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        text-decoration: none;
        background: var(--panel);
        color: var(--ink);
        font-size: 14px;
      }

      .layout {
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 56px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
        gap: 20px;
        align-items: stretch;
        padding: 18px 0 22px;
      }

      .run-hero {
        grid-template-columns: 1fr;
        padding-bottom: 12px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(30px, 5vw, 58px);
        line-height: 0.98;
        max-width: 780px;
      }

      h2 {
        font-size: 18px;
        margin-bottom: 12px;
      }

      h3 {
        font-size: 14px;
        margin-bottom: 8px;
      }

      .subcopy {
        max-width: 720px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.55;
        margin-top: 14px;
      }

      .panel,
      .metric,
      .row {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .panel {
        padding: 18px;
      }

      .decision-strip {
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
        gap: 16px;
        align-items: center;
        margin: 8px 0 16px;
        padding: 16px 18px;
        border: 1px solid var(--line);
        border-left: 5px solid var(--steel);
        border-radius: 8px;
        background: var(--panel);
      }

      .decision-strip.blocked {
        border-left-color: var(--red);
      }

      .decision-strip.review {
        border-left-color: var(--amber);
      }

      .decision-strip.ready {
        border-left-color: var(--green);
      }

      .band-rail {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 8px;
        margin: -4px 0 16px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcf8;
      }

      .band-rail span,
      .band-rail strong {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 9px;
        background: var(--panel);
        color: var(--ink);
        font-size: 12px;
        font-weight: 750;
        line-height: 1.25;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .band-rail span::after {
        content: "→";
        position: absolute;
        right: -10px;
        color: var(--steel);
        font-weight: 850;
        z-index: 1;
      }

      .band-rail strong {
        border-color: rgba(29, 122, 85, 0.28);
        color: var(--green);
      }

      .judge-route {
        display: grid;
        grid-template-columns: minmax(0, 0.36fr) minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        margin: -4px 0 16px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
      }

      .judge-route-label {
        min-width: 0;
      }

      .judge-route-label .eyebrow {
        margin-bottom: 3px;
      }

      .judge-route-links {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-width: 0;
      }

      .judge-route-links a {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 8px;
        background: var(--panel);
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
        text-decoration: none;
        overflow-wrap: anywhere;
      }

      .judge-route-links a:focus-visible {
        outline: 2px solid var(--steel);
        outline-offset: 2px;
      }

      .route-boundary {
        color: var(--amber);
        font-size: 12px;
        font-weight: 750;
        white-space: nowrap;
      }

      .eyebrow {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 750;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .mode {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        border-radius: 999px;
        padding: 6px 10px;
        background: #17211b;
        color: #fff;
        font-size: 12px;
        font-weight: 750;
      }

      .mode.replay {
        background: var(--amber);
      }

      .first-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
      }

      .metric {
        min-height: 138px;
        padding: 14px;
      }

      .metric strong {
        display: block;
        font-size: 30px;
        line-height: 1;
        margin: 8px 0;
      }

      .metric-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .metric-actions a {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 7px;
        background: #fbfcf8;
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
        text-decoration: none;
      }

      .metric span,
      .small {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .path-metric {
        display: grid;
        align-content: start;
        gap: 8px;
      }

      .path-pills {
        display: grid;
        gap: 5px;
      }

      .path-pill {
        display: block;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 7px;
        background: #fbfcf8;
        color: var(--muted);
        font-size: 11px;
        font-weight: 750;
        line-height: 1.2;
        overflow-wrap: anywhere;
      }

      .path-pill.blocked {
        border-color: rgba(162, 58, 50, 0.28);
        color: var(--red);
      }

      .path-pill.ready {
        border-color: rgba(29, 122, 85, 0.28);
        color: var(--green);
      }

      .final-pack-decision {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.95fr) minmax(0, 0.95fr);
        gap: 12px;
        margin-top: 12px;
      }

      .final-pack-cell {
        display: grid;
        align-content: start;
        gap: 8px;
        min-width: 0;
        padding: 14px;
        border: 1px solid var(--line);
        border-left: 4px solid var(--green);
        border-radius: 8px;
        background: var(--panel);
      }

      .final-pack-cell.hold {
        border-left-color: var(--red);
        background: #fff8f6;
      }

      .final-pack-cell.owner-action {
        border-left-color: var(--amber);
      }

      .final-pack-cell h2,
      .final-pack-cell p,
      .decision-line {
        overflow-wrap: anywhere;
      }

      .decision-line {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .stack-tight {
        display: grid;
        gap: 8px;
      }

      .section {
        margin-top: 18px;
      }

      .two-col {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        gap: 14px;
      }

      .tag-row,
      .trace {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .tag,
      .trace span,
      .freshness {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        border-radius: 999px;
        padding: 3px 7px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: #fbfcf8;
        font-size: 12px;
        line-height: 1.2;
      }

      .action-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        padding: 12px 0;
        border-top: 1px solid var(--line);
      }

      .action-row:first-of-type {
        border-top: 0;
        padding-top: 0;
      }

      .row {
        padding: 12px;
        display: grid;
        gap: 6px;
      }

      .row + .row {
        margin-top: 8px;
      }

      .row-topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        flex-wrap: wrap;
      }

      .answer-draft {
        color: var(--ink);
        font-size: 14px;
        line-height: 1.5;
      }

      .evidence-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .evidence-card {
        display: grid;
        gap: 6px;
        min-width: 0;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcf8;
      }

      .evidence-card strong,
      .evidence-card p {
        overflow-wrap: anywhere;
      }

      .freshness.current {
        color: var(--green);
        border-color: rgba(29, 122, 85, 0.32);
      }

      .freshness.stale,
      .freshness.unknown,
      .freshness.conflicting {
        color: var(--amber);
        border-color: rgba(165, 99, 24, 0.35);
      }

      .freshness.missing {
        color: var(--red);
        border-color: rgba(162, 58, 50, 0.35);
      }

      .matrix-note {
        padding: 8px 10px;
        border-radius: 6px;
        background: #f4f6f1;
        color: var(--ink);
        font-size: 13px;
        line-height: 1.45;
      }

      .reason-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .approval-detail {
        display: grid;
        gap: 5px;
        padding: 8px 10px;
        border-left: 3px solid rgba(29, 122, 85, 0.36);
        background: #f8faf5;
      }

      .appendix-detail,
      .suggestion-detail {
        display: grid;
        gap: 6px;
        min-width: 0;
        padding: 10px;
        border: 1px solid var(--line);
        border-left: 3px solid var(--steel);
        border-radius: 8px;
        background: #f8faf5;
      }

      .appendix-detail.internal-review {
        border-left-color: var(--amber);
      }

      .suggestion-detail {
        border-left-color: var(--amber);
        background: #fffaf2;
      }

      .appendix-detail p,
      .suggestion-detail p,
      .suggestion-detail strong {
        overflow-wrap: anywhere;
      }

      details {
        display: grid;
        gap: 8px;
        margin-top: 3px;
      }

      summary {
        width: fit-content;
        min-width: 0;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 3px 0;
        cursor: pointer;
        color: var(--steel);
        font-size: 13px;
        font-weight: 750;
      }

      summary:hover {
        color: var(--ink);
      }

      .lineage {
        display: grid;
        gap: 8px;
        margin-top: 4px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8faf5;
      }

      .lineage-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .lineage-step {
        display: grid;
        align-content: start;
        gap: 5px;
        min-width: 0;
        padding: 9px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .lineage-step strong,
      .lineage-step p {
        overflow-wrap: anywhere;
      }

      .lineage-step.approval,
      .lineage-step.final_pack {
        border-color: rgba(49, 83, 107, 0.28);
      }

      .lineage-stage {
        color: var(--muted);
        font-size: 11px;
        font-weight: 750;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .trace.compact {
        gap: 4px;
      }

      .trace.compact span {
        font-size: 11px;
      }

      .trace-overview {
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(340px, 0.92fr);
        align-items: start;
        gap: 14px;
      }

      .trace-overview > .panel {
        min-width: 0;
      }

      .trace-overview .proof-grid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .trace-overview .proof-point {
        padding: 8px;
      }

      .trace-overview .proof-point .eyebrow {
        font-size: 9px;
        letter-spacing: 0.04em;
      }

      .trace-overview .proof-point strong {
        font-size: 21px;
      }

      .trace-overview .proof-point p {
        font-size: 11px;
        line-height: 1.28;
      }

      .proof-grid,
      .milestone-grid,
      .item-trace-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .proof-point,
      .milestone,
      .handoff-step,
      .item-trace-card,
      .mini-event {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcf8;
      }

      .proof-point {
        padding: 10px;
      }

      .proof-point strong {
        display: block;
        margin-bottom: 3px;
        font-size: 24px;
        line-height: 1;
      }

      .milestone {
        display: grid;
        align-content: start;
        gap: 6px;
        padding: 10px;
        border-left: 3px solid var(--steel);
      }

      .milestone.review {
        border-left-color: var(--amber);
      }

      .milestone.blocked {
        border-left-color: var(--red);
      }

      .milestone.passed {
        border-left-color: var(--green);
      }

      .milestone-label {
        font-size: 12px;
        font-weight: 750;
      }

      .handoff-chain,
      .handoff-mini-list {
        display: grid;
        gap: 8px;
      }

      .handoff-step,
      .item-trace-card,
      .mini-event {
        display: grid;
        gap: 7px;
        padding: 10px;
      }

      .handoff-step {
        border-left: 3px solid var(--steel);
      }

      .handoff-step.review,
      .mini-event.review {
        border-left-color: var(--amber);
      }

      .handoff-step.human,
      .mini-event.human {
        border-left-color: var(--green);
      }

      .handoff-step.final,
      .mini-event.final {
        border-left-color: var(--steel);
      }

      .handoff-step.blocked,
      .mini-event.blocked,
      .item-trace-card.blocked {
        border-left-color: var(--red);
      }

      .handoff-route,
      .handoff-step p,
      .mini-event p,
      .item-trace-card p,
      .milestone p,
      .proof-point p {
        overflow-wrap: anywhere;
      }

      .handoff-route {
        font-size: 14px;
        font-weight: 700;
      }

      .trace-status {
        background: var(--steel);
      }

      .trace-status.review {
        background: var(--amber);
      }

      .trace-status.human,
      .trace-status.final {
        background: var(--green);
      }

      .trace-status.blocked {
        background: var(--red);
      }

      .item-trace-panel {
        display: grid;
        gap: 12px;
      }

      .item-trace-card {
        border-left: 3px solid var(--green);
      }

      .mini-event {
        background: var(--panel);
        border-left: 3px solid var(--steel);
      }

      .impact-path {
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(162, 58, 50, 0.25);
        border-radius: 8px;
        background: #fff8f6;
      }

      .impact-steps {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .impact-steps span {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        width: fit-content;
        border: 1px solid rgba(162, 58, 50, 0.26);
        border-radius: 999px;
        padding: 4px 8px;
        color: var(--red);
        background: var(--panel);
        font-size: 12px;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .buyer-story {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid rgba(162, 58, 50, 0.22);
        border-left: 4px solid var(--red);
        border-radius: 8px;
        background: #fffaf7;
      }

      .buyer-story h3,
      .buyer-story p {
        overflow-wrap: anywhere;
      }

      .buyer-story-steps {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .buyer-story-step {
        display: grid;
        align-content: start;
        gap: 5px;
        min-width: 0;
        padding: 10px;
        border-top: 3px solid var(--steel);
        background: rgba(255, 255, 255, 0.7);
      }

      .buyer-story-step.blocked {
        border-top-color: var(--red);
      }

      .buyer-story-step.review {
        border-top-color: var(--amber);
      }

      .buyer-story-step.human {
        border-top-color: var(--green);
      }

      .buyer-story-step strong {
        color: var(--ink);
        font-size: 13px;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .buyer-story-step p {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .owner-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .owner-cell {
        display: grid;
        gap: 4px;
        min-width: 0;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcf8;
      }

      .status {
        display: inline-flex;
        width: fit-content;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        background: var(--steel);
      }

      .status.ready {
        background: var(--green);
      }

      .status.blocked {
        background: var(--red);
      }

      .status.review {
        background: var(--amber);
      }

      .timeline {
        display: grid;
        gap: 8px;
        max-height: 560px;
        overflow: auto;
        padding-right: 4px;
      }

      .event {
        border-left: 3px solid var(--steel);
        padding: 10px 12px;
        background: #fbfcf8;
      }

      .event strong {
        display: block;
        font-size: 13px;
      }

      .footer-note {
        color: var(--muted);
        margin-top: 24px;
        font-size: 13px;
      }

      @media (max-width: 980px) {
        .hero,
        .decision-strip,
        .judge-route,
        .band-rail,
        .final-pack-decision,
        .two-col,
        .trace-overview {
          grid-template-columns: 1fr;
        }

        .band-rail span::after {
          content: "";
        }

        .band-rail {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .route-boundary {
          white-space: normal;
        }

        .first-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .band-rail {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .evidence-grid,
        .lineage-grid,
        .owner-grid,
        .trace-overview .proof-grid,
        .proof-grid,
        .milestone-grid,
        .item-trace-grid,
        .buyer-story-steps {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 620px) {
        .topbar {
          align-items: center;
          flex-direction: row;
          padding: 12px 10px;
        }

        .layout {
          width: min(100vw - 20px, 1280px);
          padding-top: 12px;
        }

        .first-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .metric {
          min-height: 104px;
          padding: 10px;
        }

        .metric strong {
          font-size: 24px;
          margin: 6px 0;
        }

        .metric h2 {
          font-size: 15px;
          margin-bottom: 6px;
        }

        .subcopy {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
