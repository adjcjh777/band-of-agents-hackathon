<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      :root {
        --ink: #17211b;
        --muted: #5f6b63;
        --line: #d9ded8;
        --panel: #ffffff;
        --page: #f4f6f1;
        --green: #1d7a55;
        --amber: #a56318;
        --red: #a23a32;
        --steel: #31536b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      a {
        color: inherit;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 28px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
        position: sticky;
        top: 0;
        z-index: 2;
      }

      .brand {
        font-weight: 750;
        font-size: 18px;
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .nav a,
      .button {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        text-decoration: none;
        background: var(--panel);
        color: var(--ink);
        font-size: 14px;
      }

      .layout {
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 56px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
        gap: 20px;
        align-items: stretch;
        padding: 18px 0 22px;
      }

      .run-hero {
        grid-template-columns: 1fr;
        padding-bottom: 12px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(30px, 5vw, 58px);
        line-height: 0.98;
        max-width: 780px;
      }

      h2 {
        font-size: 18px;
        margin-bottom: 12px;
      }

      h3 {
        font-size: 14px;
        margin-bottom: 8px;
      }

      .subcopy {
        max-width: 720px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.55;
        margin-top: 14px;
      }

      .panel,
      .metric,
      .row {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .panel {
        padding: 18px;
      }

      .mode {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        border-radius: 999px;
        padding: 6px 10px;
        background: #17211b;
        color: #fff;
        font-size: 12px;
        font-weight: 750;
      }

      .mode.replay {
        background: var(--amber);
      }

      .first-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }

      .metric {
        min-height: 138px;
        padding: 14px;
      }

      .metric strong {
        display: block;
        font-size: 30px;
        line-height: 1;
        margin: 8px 0;
      }

      .metric span,
      .small {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .section {
        margin-top: 18px;
      }

      .two-col {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        gap: 14px;
      }

      .row {
        padding: 12px;
        display: grid;
        gap: 6px;
      }

      .row + .row {
        margin-top: 8px;
      }

      .status {
        display: inline-flex;
        width: fit-content;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        background: var(--steel);
      }

      .status.ready {
        background: var(--green);
      }

      .status.blocked {
        background: var(--red);
      }

      .status.review {
        background: var(--amber);
      }

      .timeline {
        display: grid;
        gap: 8px;
        max-height: 560px;
        overflow: auto;
        padding-right: 4px;
      }

      .event {
        border-left: 3px solid var(--steel);
        padding: 10px 12px;
        background: #fbfcf8;
      }

      .event strong {
        display: block;
        font-size: 13px;
      }

      .footer-note {
        color: var(--muted);
        margin-top: 24px;
        font-size: 13px;
      }

      @media (max-width: 980px) {
        .hero,
        .two-col {
          grid-template-columns: 1fr;
        }

        .first-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .topbar {
          align-items: center;
          flex-direction: row;
          padding: 12px 10px;
        }

        .layout {
          width: min(100vw - 20px, 1280px);
          padding-top: 12px;
        }

        .first-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .metric {
          min-height: 104px;
          padding: 10px;
        }

        .metric strong {
          font-size: 24px;
          margin: 6px 0;
        }

        .metric h2 {
          font-size: 15px;
          margin-bottom: 6px;
        }

        .subcopy {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">RFP TrustRoom</div>
      <nav class="nav" aria-label="Demo routes">
        <a href="/">Home</a>
        <a href="/runs/demo">Mock</a>
        <a href="/runs/demo/replay">Replay</a>
      </nav>
    </header>
    <main class="layout">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
